    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GUBER",
      "alternateName": "GUBER App",
      "url": "https://guberapp.app",
      "description": "Trust-enforced local visibility network. Post jobs, find workers, verify identities — all in your community.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://guberapp.app/browse-jobs?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oxanium:wght@200..800&display=swap" as="style" onload="this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oxanium:wght@200..800&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capture beforeinstallprompt as early as possible — before React loads.
      // Chrome fires this event very early; if the React component hasn't mounted
      // yet the event is lost. We stash it on window so the component can pick it up.
      window.__installPromptEvent = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__installPromptEvent = e;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
