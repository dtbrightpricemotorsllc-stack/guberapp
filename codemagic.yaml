workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing: Codemagic Code Signing Identities (manually uploaded assets).
    #   Certificate : GUBER_iOS_Distribution
    #   Profile     : GUBER_Profile_v3  (com.guber.app, App Store)
    #
    # ios_signing block tells Codemagic to install those assets before scripts run.
    # xcode-project use-profiles then patches project.pbxproj with the real UUID —
    # so we never hardcode a profile name that might not match what is on disk.
    # ---------------------------------------------------------------------------
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          # ios_signing block already installs certificate + profile.
          # keychain add-certificates makes them accessible to xcodebuild.
          # xcode-project use-profiles patches the App target's
          # PROVISIONING_PROFILE_SPECIFIER with the installed profile UUID —
          # this is the only correct way to reference it; never hardcode by name.
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Xcode archive (App Store export)
        script: |
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # xcconfig to force minimal strict-concurrency across all targets
          # including SPM packages (plain xcodebuild overrides don't reach them)
          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -xcconfig /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo ""
            echo "====== LAST 50 LINES ======"
            tail -50 /tmp/xcodebuild_archive.log
            echo ""
            echo "====== COMPILE ERRORS (actionable lines) ======"
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -80 || \
              grep -iE " error:" /tmp/xcodebuild_archive.log | grep -v "^note:" | head -80 || \
              echo "(no error: lines found — check artifacts zip for full log)"
            exit "$ARCHIVE_STATUS"
          fi

          # Export IPA — signing style automatic so xcodebuild uses whatever
          # profile xcode-project use-profiles already wired into the project.
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>7MC93QFW6Q</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$IPA_DIR" 2>&1 | tee /tmp/xcodebuild_export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
