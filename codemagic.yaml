workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing: GUBER_AppStore_Profile_v3 (com.guber.app, App Store Distribution)
    #   - PROVISIONING_PROFILE_SPECIFIER is hardcoded in project.pbxproj Release
    #     config so cap sync ios cannot overwrite it.
    #   - ExportOptions.plist names the profile explicitly — no shell extraction.
    #   - -allowProvisioningUpdates added as belt-and-suspenders so Xcode can
    #     download/refresh the profile if it isn't found locally.
    #
    # Required vars in the "Default" Codemagic environment group:
    #   APP_STORE_CONNECT_ISSUER_ID
    #   APP_STORE_CONNECT_KEY_IDENTIFIER
    #   APP_STORE_CONNECT_PRIVATE_KEY
    # ---------------------------------------------------------------------------
    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        PROFILE_NAME: GUBER_AppStore_Profile_v3
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          keychain initialize
          keychain add-certificates

          # Wipe any cached profiles and fetch GUBER_AppStore_Profile_v3 fresh.
          echo "=== Clearing cached provisioning profiles ==="
          rm -rf "$PROF_DIR"
          mkdir -p "$PROF_DIR"

          echo "=== Fetching $PROFILE_NAME from Apple Developer ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create

          echo "=== Installed profiles ==="
          ls -1 "$PROF_DIR" 2>/dev/null || echo "(none — fetch failed)"

          echo "=== Profile capability audit ==="
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            security cms -D -i "$f" 2>/dev/null \
              | grep -A1 -E "<key>(Name|UUID|application-identifier)</key>" || true
            PUSH=$(security cms -D -i "$f" 2>/dev/null | grep -c "aps-environment" || true)
            SIWA=$(security cms -D -i "$f" 2>/dev/null | grep -c "com.apple.developer.applesignin" || true)
            echo "  aps-environment (Push Notifications) : $PUSH"
            echo "  applesignin     (Sign in with Apple) : $SIWA"
            if [ "$PUSH" = "0" ] || [ "$SIWA" = "0" ]; then
              echo "  ERROR: profile is missing one or more required capabilities"
              echo "  ACTION: go to developer.apple.com -> Profiles -> $PROFILE_NAME -> Edit -> Save"
              exit 1
            fi
            echo "  OK: profile contains both required capabilities"
          done

          # Patch PROVISIONING_PROFILE_SPECIFIER and CODE_SIGN_STYLE in pbxproj.
          # This is belt-and-suspenders — the specifier is already hardcoded in
          # the Release config, but use-profiles also sets the UUID correctly.
          xcode-project use-profiles

          echo "=== Signing settings in project.pbxproj (Release) ==="
          grep -E "PROVISIONING_PROFILE|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY" \
            ios/App/App.xcodeproj/project.pbxproj || true

      - name: Xcode archive + export (App Store)
        script: |
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          # ── ARCHIVE ────────────────────────────────────────────────────────
          echo "=== Starting archive ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -40 || true
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── DIAGNOSTIC: dump entitlements embedded in the archive ──────────
          echo "=== Entitlements embedded in archived App.app ==="
          codesign -d --entitlements :- \
            "$ARCHIVE_PATH/Products/Applications/App.app" 2>/dev/null || \
            echo "(codesign entitlements dump failed — check archive manually)"

          # ── DIAGNOSTIC: confirm which profile is on disk ───────────────────
          echo "=== Profiles on disk at export time ==="
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            NAME=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>Name<\/key>/{f=1;next} f{gsub(/[ \t]*<\/?string>[ \t]*/,"");print;exit}')
            UUID=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>UUID<\/key>/{f=1;next} f{gsub(/[ \t]*<\/?string>[ \t]*/,"");print;exit}')
            echo "  Name : $NAME"
            echo "  UUID : $UUID"
          done

          # ── WRITE API KEY ──────────────────────────────────────────────────
          # Handle both "raw key body" and "full PEM with headers" storage formats.
          if echo "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          else
            printf '-----BEGIN PRIVATE KEY-----\n%s\n-----END PRIVATE KEY-----\n' \
              "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          fi
          chmod 600 "$AUTH_KEY_PATH"

          # ── EXPORT OPTIONS ─────────────────────────────────────────────────
          # Profile named explicitly — no runtime extraction needed.
          # -allowProvisioningUpdates lets Xcode fetch the profile via API if
          # it isn't found on disk by name.
          cat > /tmp/ExportOptions.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>teamID</key>
  <string>7MC93QFW6Q</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>com.guber.app</key>
    <string>GUBER_AppStore_Profile_v3</string>
  </dict>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          # ── EXPORT ─────────────────────────────────────────────────────────
          echo "=== Starting export ==="
          xcodebuild \
            -exportArchive \
            -archivePath               "$ARCHIVE_PATH" \
            -exportOptionsPlist        /tmp/ExportOptions.plist \
            -exportPath                "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "IPA exported to: $(find "$IPA_DIR" -name "*.ipa")"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
