workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        APP_STORE_CONNECT_KEY_IDENTIFIER: UG7A49Y842
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/ipa"
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          mkdir -p "$IPA_DIR"

          KEY_FILE="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"

          # Strip every CODE_SIGN_IDENTITY line ios_signing may have injected
          # (including the sdk=iphoneos* conditional variant).
          # grep -v is safer than sed for lines with square brackets.
          grep -v "CODE_SIGN_IDENTITY" "$PBXPROJ" > /tmp/pbxproj.tmp \
            && mv /tmp/pbxproj.tmp "$PBXPROJ"

          # Ensure CODE_SIGN_STYLE is Automatic for both configurations.
          sed -i '' \
            's/CODE_SIGN_STYLE = [A-Za-z]*/CODE_SIGN_STYLE = Automatic/g' \
            "$PBXPROJ"

          echo "=== grep -R CODE_SIGN_IDENTITY ios/App ==="
          grep -Rn "CODE_SIGN_IDENTITY" ios/App/ || echo "(none — clean)"

          echo "=== CODE_SIGN_STYLE lines in pbxproj ==="
          grep -n "CODE_SIGN_STYLE" "$PBXPROJ" || echo "(none)"

          echo "=== CODE_SIGN env vars ==="
          env | grep -i "code_sign\|provisioning\|certificate" || echo "(none)"

          echo "=== Keychain identities ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "(none)"

          # Archive — pure Automatic signing, -allowProvisioningUpdates manages
          # certificate + profile via the connected ASC key.
          xcodebuild archive \
            -workspace        "$XCODE_WORKSPACE" \
            -scheme           "$XCODE_SCHEME" \
            -configuration    Release \
            -archivePath      "$ARCHIVE_PATH" \
            -destination      "generic/platform=iOS" \
            -derivedDataPath  /tmp/dd \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/archive.log
          ARCHIVE_RC=${PIPESTATUS[0]}

          if [ "$ARCHIVE_RC" -ne 0 ]; then
            echo ""
            echo "====== POST-FAILURE DIAGNOSTICS ======"
            echo "--- pbxproj CODE_SIGN lines ---"
            grep -n "CODE_SIGN\|PROVISIONING_PROFILE" "$PBXPROJ" || echo "(none)"
            echo "--- Effective build settings ---"
            xcodebuild -showBuildSettings \
              -workspace     "$XCODE_WORKSPACE" \
              -scheme        "$XCODE_SCHEME" \
              -configuration Release \
              2>/dev/null \
              | grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM" \
              || echo "(error running showBuildSettings)"
            echo "--- archive.log tail ---"
            tail -30 /tmp/archive.log
            echo "======================================"
            exit "$ARCHIVE_RC"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          cat > /tmp/ExportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
  <key>method</key><string>app-store-connect</string>
  <key>teamID</key><string>7MC93QFW6Q</string>
  <key>signingStyle</key><string>automatic</string>
</dict></plist>
EOF

          xcodebuild -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            2>&1 | tee /tmp/export.log
          test "${PIPESTATUS[0]}" -eq 0

          echo "=== IPA ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/archive.log
      - /tmp/export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
