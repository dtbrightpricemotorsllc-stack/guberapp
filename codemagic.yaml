workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Apply provisioning profiles
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "=== Installed profiles ==="
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || { echo "  (none)"; break; }
            security cms -D -i "$f" -o /tmp/_p.plist 2>/dev/null || continue
            echo "  Name    : $(/usr/libexec/PlistBuddy -c 'Print :Name'         /tmp/_p.plist 2>/dev/null)"
            echo "  UUID    : $(/usr/libexec/PlistBuddy -c 'Print :UUID'         /tmp/_p.plist 2>/dev/null)"
            echo "  AppID   : $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/_p.plist 2>/dev/null)"
            echo "  Expires : $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/_p.plist 2>/dev/null)"
            echo "---"
          done

          # Find the profile whose AppID covers our bundle
          TARGET_UUID=""
          TARGET_NAME=""
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" -o /tmp/_p.plist 2>/dev/null || continue
            APPID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/_p.plist 2>/dev/null || echo "")
            if echo "$APPID" | grep -qF "$BUNDLE_ID"; then
              TARGET_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/_p.plist)
              TARGET_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/_p.plist)
              break
            fi
          done

          if [ -z "$TARGET_UUID" ]; then
            echo "FATAL: No installed profile covers $BUNDLE_ID"
            echo "The ios_signing group must have APP_STORE_CONNECT credentials in the Default group"
            echo "or a manually uploaded profile matching $BUNDLE_ID in Code Signing Identities."
            exit 1
          fi

          echo "=== Matched profile: $TARGET_NAME ($TARGET_UUID) ==="

          # xcode-project use-profiles: Codemagic CLI tool that rewrites the Xcode
          # project to use installed profiles by UUID — no name matching required.
          xcode-project use-profiles \
            --project "ios/App/App.xcodeproj" \
            --targets App \
            2>&1 || true   # non-fatal: falls back to manual patch below

          # Manual patch as fallback: write UUID directly into project.pbxproj.
          # UUID lookup is unambiguous; Xcode finds the profile regardless of name.
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          python3 - "$PBXPROJ" "$TARGET_NAME" "$TARGET_UUID" << 'PYEOF'
          import sys, re
          path, name, uuid = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path, 'r') as f:
              text = f.read()
          # Replace the PROVISIONING_PROFILE_SPECIFIER value with the actual name
          text = re.sub(
              r'(PROVISIONING_PROFILE_SPECIFIER\s*=\s*")[^"]*(")',
              rf'\g<1>{name}\2',
              text
          )
          with open(path, 'w') as f:
              f.write(text)
          print(f"Patched PROVISIONING_PROFILE_SPECIFIER → {name}")
          PYEOF

          # Persist UUID for Archive step
          printf '%s' "$TARGET_UUID" > /tmp/CM_PROFILE_UUID
          printf '%s' "$TARGET_NAME" > /tmp/CM_PROFILE_NAME
          echo "Profile UUID saved: $TARGET_UUID"

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          PROFILE_UUID=$(cat /tmp/CM_PROFILE_UUID)
          PROFILE_NAME=$(cat /tmp/CM_PROFILE_NAME)

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"
          echo "Archiving: $PROFILE_NAME ($PROFILE_UUID)"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 60 lines ======"
            tail -60 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>provisioningProfiles</key><dict>
              <key>$BUNDLE_ID</key><string>$PROFILE_UUID</string>
            </dict>
          </dict></plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
