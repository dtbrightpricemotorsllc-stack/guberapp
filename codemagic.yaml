workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing: Codemagic Code Signing Identities (manually uploaded assets).
    #   Certificate : GUBER_iOS_Distribution
    #   Profile     : GUBER_Profile_v3  (com.guber.app, App Store)
    # ---------------------------------------------------------------------------
    environment:
      groups:
        - Default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Xcode archive (App Store export)
        script: |
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -xcconfig /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo ""
            echo "====== LAST 50 LINES ======"
            tail -50 /tmp/xcodebuild_archive.log
            echo ""
            echo "====== COMPILE ERRORS (actionable lines) ======"
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -80 || \
              grep -iE " error:" /tmp/xcodebuild_archive.log | grep -v "^note:" | head -80 || \
              echo "(no error: lines found — check artifacts zip for full log)"
            exit "$ARCHIVE_STATUS"
          fi

          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>7MC93QFW6Q</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$IPA_DIR" 2>&1 | tee /tmp/xcodebuild_export.log

      - name: Upload to TestFlight via app-store-connect CLI
        script: |
          echo "=== IPA search ==="
          find /Users/builder /tmp "$CM_BUILD_DIR" -name "*.ipa" -print 2>/dev/null || true
          IPA_PATH=$(find /Users/builder /tmp "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null | head -1)
          echo "IPA_PATH=$IPA_PATH"

          echo "=== Credential check ==="
          MISSING=""
          [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]  && MISSING="$MISSING APP_STORE_CONNECT_KEY_IDENTIFIER"
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]       && MISSING="$MISSING APP_STORE_CONNECT_ISSUER_ID"
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]     && MISSING="$MISSING APP_STORE_CONNECT_PRIVATE_KEY"

          if [ -n "$MISSING" ]; then
            echo "ERROR: The following secrets are blank in this build environment:"
            for v in $MISSING; do echo "  - $v"; done
            echo ""
            echo "Fix: In Codemagic → guberapp → Environment variables,"
            echo "ensure these are saved and their Group is set to 'default'."
            exit 1
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa found under \$CM_BUILD_DIR/build"
            echo "Contents of \$CM_BUILD_DIR/build/ios:"
            find "$CM_BUILD_DIR/build/ios" -print 2>/dev/null | head -40 || true
            exit 1
          fi

          echo "=== Uploading ==="
          echo "IPA:      $IPA_PATH"
          echo "Key ID:   $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer:   $APP_STORE_CONNECT_ISSUER_ID"

          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --path "$IPA_PATH" \
            --testflight \
            --max-build-processing-wait 0

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log
