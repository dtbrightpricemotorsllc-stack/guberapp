workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Code signing uses identities stored in the Codemagic dashboard under
    # Code signing identities:
    #   Certificate:          GUBER_iOS_Distribution
    #   Provisioning profile: GUBER_AppStore_Profile
    #
    # App Store Connect API key (required for TestFlight upload) — set these
    # three environment variables in the Codemagic dashboard:
    #   APP_STORE_CONNECT_ISSUER_ID       From App Store Connect → Keys page
    #   APP_STORE_CONNECT_KEY_IDENTIFIER  Key ID shown next to the key name
    #   APP_STORE_CONNECT_PRIVATE_KEY     Full contents of the downloaded .p8 file
    # ---------------------------------------------------------------------------
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Set up code signing keychain
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Xcode archive (App Store export)
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
