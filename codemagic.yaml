workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing: fully automatic via App Store Connect API.
    # app-store-connect fetch-signing-files fetches the provisioning profile
    # directly from Apple on every build — guaranteed to include all current
    # App ID capabilities (Sign in with Apple, Push Notifications, etc.).
    # No ios_signing block so Codemagic does NOT pre-load any manually uploaded
    # profile from Code Signing Identities (avoids stale profile conflict).
    #
    # Required env vars in the Codemagic dashboard:
    #   APP_STORE_CONNECT_ISSUER_ID       From App Store Connect → Keys page
    #   APP_STORE_CONNECT_KEY_IDENTIFIER  Key ID
    #   APP_STORE_CONNECT_PRIVATE_KEY     Full contents of the .p8 file
    # ---------------------------------------------------------------------------
    environment:
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          keychain initialize

          # Fetch the provisioning profile directly from Apple via App Store
          # Connect API. This guarantees the profile reflects the live App ID
          # capabilities (Sign in with Apple, etc.) with no manual upload needed.
          # --create will regenerate the profile on Apple's side if missing.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --create

          # Add the distribution certificate (GUBER_iOS_Distribution) from
          # Codemagic Code Signing Identities to the keychain.
          keychain add-certificates

          # Apply the fetched profile to the Xcode project.
          xcode-project use-profiles

      - name: Xcode archive (App Store export)
        script: |
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # xcconfig to force minimal strict-concurrency across all targets
          # including SPM packages (plain xcodebuild overrides don't reach them)
          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -xcconfig /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo ""
            echo "====== LAST 50 LINES ======"
            tail -50 /tmp/xcodebuild_archive.log
            echo ""
            echo "====== COMPILE ERRORS (actionable lines) ======"
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -80 || \
              grep -iE " error:" /tmp/xcodebuild_archive.log | grep -v "^note:" | head -80 || \
              echo "(no error: lines found — check artifacts zip for full log)"
            exit "$ARCHIVE_STATUS"
          fi

          # Export IPA
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$IPA_DIR" 2>&1 | tee /tmp/xcodebuild_export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
