workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ── Signing ───────────────────────────────────────────────────────────────
    # ios_signing fetches all App Store profiles for com.guber.app.
    # The signing step immediately deletes every profile that is NOT named
    # "GUBER_Profile_v3" so Xcode cannot auto-select a stale/wrong profile.
    # ExportOptions.plist references the profile by UUID (globally unique —
    # cannot be mismatched by name collision).
    # ─────────────────────────────────────────────────────────────────────────
    environment:
      groups:
        - Default
      ios_signing:
        distribution_type: APP_STORE
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        TARGET_PROFILE_NAME: GUBER_Profile_v3
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Set up code signing — keep only GUBER_Profile_v3
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          keychain initialize
          keychain add-certificates

          # ── List every profile ios_signing installed ──────────────────────
          echo "=== All profiles installed by ios_signing ==="
          IDX=0
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            IDX=$((IDX+1))
            security cms -D -i "$f" -o "/tmp/_p${IDX}.plist" 2>/dev/null
            N=$(/usr/libexec/PlistBuddy -c "Print :Name" "/tmp/_p${IDX}.plist" 2>/dev/null || echo "UNKNOWN")
            U=$(/usr/libexec/PlistBuddy -c "Print :UUID" "/tmp/_p${IDX}.plist" 2>/dev/null || echo "UNKNOWN")
            echo "  [$IDX] $N  ($U)  — file: $(basename "$f")"
          done
          echo "  Total: $IDX profile(s)"

          # ── Delete every profile that is NOT GUBER_Profile_v3 ────────────
          echo ""
          echo "=== Pruning: keeping only '$TARGET_PROFILE_NAME' ==="
          KEPT=0
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" -o /tmp/_prune.plist 2>/dev/null
            N=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/_prune.plist 2>/dev/null || echo "")
            if [ "$N" = "$TARGET_PROFILE_NAME" ]; then
              echo "  KEEP : $N"
              KEPT=$((KEPT+1))
            else
              echo "  DELETE: $N  ($(basename "$f"))"
              rm -f "$f"
            fi
          done

          if [ "$KEPT" = "0" ]; then
            echo ""
            echo "FATAL: '$TARGET_PROFILE_NAME' was not found among the installed profiles."
            echo "Go to Codemagic → Code signing → iOS provisioning profiles and verify"
            echo "that '$TARGET_PROFILE_NAME' is fetched and stored there."
            exit 1
          fi
          echo "  Profiles remaining: $KEPT"

          # ── Verify capabilities of GUBER_Profile_v3 ──────────────────────
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          security cms -D -i "$PROF_FILE" -o /tmp/target_prof.plist 2>/dev/null
          PUSH=$(grep -c "aps-environment"              /tmp/target_prof.plist 2>/dev/null || true)
          SIWA=$(grep -c "com.apple.developer.applesignin" /tmp/target_prof.plist 2>/dev/null || true)
          PROF_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/target_prof.plist 2>/dev/null)

          echo ""
          echo "=== GUBER_Profile_v3 capability audit ==="
          echo "  UUID                    : $PROF_UUID"
          echo "  aps-environment (Push)  : $PUSH"
          echo "  applesignin (SIWA)      : $SIWA"

          if [ "$PUSH" = "0" ] || [ "$SIWA" = "0" ]; then
            echo ""
            echo "FATAL: Profile is missing Push Notifications or Sign in with Apple."
            echo "  Go to developer.apple.com → Profiles → '$TARGET_PROFILE_NAME'"
            echo "  → Edit → Save  (re-generates the profile with current App ID capabilities)"
            echo "  Then re-fetch in Codemagic and re-run the build."
            exit 1
          fi
          echo "  Status: OK — both capabilities present"

          # ── Patch pbxproj with this profile ──────────────────────────────
          xcode-project use-profiles

          echo ""
          echo "=== Release signing config after use-profiles ==="
          grep -E "PROVISIONING_PROFILE|CODE_SIGN" \
            ios/App/App.xcodeproj/project.pbxproj | grep -v "//" || true

      - name: Archive and Export (App Store)
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # ── Re-read profile from disk (only GUBER_Profile_v3 is present) ─
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROF_FILE" ]; then
            echo "FATAL: No profile on disk — signing step may have failed."; exit 1
          fi
          security cms -D -i "$PROF_FILE" -o /tmp/use_prof.plist 2>/dev/null
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/use_prof.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/use_prof.plist)

          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  PROFILE SELECTED FOR ARCHIVE + EXPORT                  ║"
          echo "║  Name : $PROFILE_NAME"
          echo "║  UUID : $PROFILE_UUID"
          echo "╚══════════════════════════════════════════════════════════╝"

          # ── Write API key (.p8) ──────────────────────────────────────────
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          else
            { echo "-----BEGIN PRIVATE KEY-----"
              printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY"
              echo ""
              echo "-----END PRIVATE KEY-----"; } > "$AUTH_KEY_PATH"
          fi
          chmod 600 "$AUTH_KEY_PATH"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          # ── ARCHIVE ──────────────────────────────────────────────────────
          echo "=== Starting archive ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── Confirm entitlements in archive ─────────────────────────────
          echo "=== Entitlements embedded in .xcarchive ==="
          codesign -d --entitlements :- \
            "$ARCHIVE_PATH/Products/Applications/App.app" 2>&1 || true

          echo "=== Profile embedded in .xcarchive ==="
          EMBEDDED="$ARCHIVE_PATH/Products/Applications/App.app/embedded.mobileprovision"
          if [ -f "$EMBEDDED" ]; then
            security cms -D -i "$EMBEDDED" -o /tmp/embedded_prof.plist 2>/dev/null
            EMB_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/embedded_prof.plist 2>/dev/null || echo "?")
            EMB_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/embedded_prof.plist 2>/dev/null || echo "?")
            echo "  Embedded Name : $EMB_NAME"
            echo "  Embedded UUID : $EMB_UUID"
          else
            echo "  (no embedded.mobileprovision found)"
          fi

          # ── ExportOptions — profile by UUID (cannot be mismatched) ──────
          cat > /tmp/ExportOptions.plist << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store-connect</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>teamID</key>
  <string>${TEAM_ID}</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>${BUNDLE_ID}</key>
    <string>${PROFILE_UUID}</string>
  </dict>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          # ── EXPORT ───────────────────────────────────────────────────────
          echo "=== Starting export — UUID: $PROFILE_UUID ==="
          xcodebuild \
            -exportArchive \
            -archivePath               "$ARCHIVE_PATH" \
            -exportOptionsPlist        /tmp/ExportOptions.plist \
            -exportPath                "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported successfully ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
