workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing strategy:
    #   1. Delete any existing App Store profile for com.guber.app from Apple
    #      Developer Portal (forces a fresh one to be generated with current
    #      App ID capabilities — Push Notifications + Sign in with Apple).
    #   2. Fetch the fresh profile and add it to the keychain.
    #   3. Archive using project.pbxproj patched by xcode-project use-profiles.
    #   4. Export using -allowProvisioningUpdates + API key so Xcode resolves
    #      the profile directly (bypasses ExportOptions provisioningProfiles
    #      lookup entirely — eliminates the "requires profile with Push/SIWA"
    #      export failure).
    #
    # Required vars in the "Default" Codemagic environment group:
    #   APP_STORE_CONNECT_ISSUER_ID
    #   APP_STORE_CONNECT_KEY_IDENTIFIER
    #   APP_STORE_CONNECT_PRIVATE_KEY
    # ---------------------------------------------------------------------------
    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          keychain initialize
          keychain add-certificates

          # ── Step 1: Wipe all locally cached profiles ─────────────────────
          echo "=== Clearing cached provisioning profiles ==="
          rm -rf "$PROF_DIR"
          mkdir -p "$PROF_DIR"

          # ── Step 2: Delete existing App Store profiles from Apple Developer
          #    so --create always generates a FRESH one with current App ID
          #    capabilities (Push Notifications + Sign in with Apple).
          echo "=== Deleting stale profiles from Apple Developer Portal ==="
          app-store-connect list-profiles \
            --bundle-id-identifier "$BUNDLE_ID" \
            --profile-type IOS_APP_STORE \
            --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --json 2>/dev/null \
          | python3 -c "
import sys, json
try:
    for p in json.load(sys.stdin):
        pid = p.get('id') or (p.get('attributes') or {}).get('id') or ''
        if pid:
            print(pid)
except Exception as e:
    sys.stderr.write(str(e) + '\n')
" | while IFS= read -r pid; do
              [ -n "$pid" ] || continue
              echo "  Deleting profile ID: $pid"
              app-store-connect delete-profile "$pid" \
                --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
                --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
                --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" || true
            done

          # ── Step 3: Fetch a FRESH profile ─────────────────────────────────
          echo "=== Fetching fresh App Store profile from Apple Developer ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create

          # ── Step 4: Audit the installed profile ───────────────────────────
          echo "=== Installed profiles ==="
          ls -1 "$PROF_DIR" 2>/dev/null || echo "(none — fetch may have failed)"

          echo "=== Profile capability audit ==="
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            security cms -D -i "$f" 2>/dev/null \
              | grep -A1 -E "<key>(Name|UUID|application-identifier)</key>" || true
            PUSH=$(security cms -D -i "$f" 2>/dev/null | grep -c "aps-environment" || true)
            SIWA=$(security cms -D -i "$f" 2>/dev/null | grep -c "com.apple.developer.applesignin" || true)
            echo "  aps-environment (Push Notifications) : $PUSH"
            echo "  applesignin     (Sign in with Apple) : $SIWA"
            if [ "$PUSH" = "0" ] || [ "$SIWA" = "0" ]; then
              echo "  WARNING: profile is missing one or more required capabilities"
            else
              echo "  OK: profile contains both required capabilities"
            fi
          done

          # ── Step 5: Patch pbxproj with the fetched profile's UUID ─────────
          xcode-project use-profiles

      - name: Xcode archive + export (App Store)
        script: |
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          # ── ARCHIVE ────────────────────────────────────────────────────────
          echo "=== Starting archive ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -40 || true
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── WRITE API KEY FOR EXPORT ───────────────────────────────────────
          # xcodebuild -allowProvisioningUpdates needs the .p8 on disk.
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          chmod 600 "$AUTH_KEY_PATH"

          # ── EXPORT OPTIONS ─────────────────────────────────────────────────
          # No signingStyle / provisioningProfiles needed: -allowProvisioningUpdates
          # tells Xcode to resolve the profile directly via the API key.
          cat > /tmp/ExportOptions.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>teamID</key>
  <string>7MC93QFW6Q</string>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          # ── EXPORT ─────────────────────────────────────────────────────────
          # -allowProvisioningUpdates + auth key flags let Xcode fetch and
          # validate the profile itself — no manual provisioningProfiles dict.
          echo "=== Starting export ==="
          xcodebuild \
            -exportArchive \
            -archivePath              "$ARCHIVE_PATH" \
            -exportOptionsPlist       /tmp/ExportOptions.plist \
            -exportPath               "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath    "$AUTH_KEY_PATH" \
            -authenticationKeyID      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          # Clean up key file regardless of outcome
          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 30 lines ======"
            tail -30 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "IPA exported to: $(find "$IPA_DIR" -name "*.ipa")"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
