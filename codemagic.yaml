workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        APP_STORE_CONNECT_KEY_IDENTIFIER: UG7A49Y842
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Dump installed signing assets
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "=== Installed provisioning profiles ==="
          count=0
          for f in "$PROF_DIR"/*.mobileprovision 2>/dev/null; do
            [ -f "$f" ] || continue
            count=$((count+1))
            security cms -D -i "$f" -o /tmp/_p.plist 2>/dev/null || continue
            echo "  Name    : $(/usr/libexec/PlistBuddy -c 'Print :Name'         /tmp/_p.plist 2>/dev/null || echo '?')"
            echo "  UUID    : $(/usr/libexec/PlistBuddy -c 'Print :UUID'         /tmp/_p.plist 2>/dev/null || echo '?')"
            echo "  AppID   : $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/_p.plist 2>/dev/null || echo '?')"
            echo "  Expires : $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/_p.plist 2>/dev/null || echo '?')"
            echo "---"
          done
          echo "(total: $count profile(s))"
          echo ""
          echo "=== Installed distribution certificates ==="
          security find-identity -v -p codesigning | grep -iE "distribution|development" || echo "(none)"

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          # Write the App Store Connect API key so xcodebuild can manage
          # provisioning profiles automatically via -allowProvisioningUpdates.
          # This avoids all name/UUID matching fragility.
          KEY_FILE="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          echo "ASC key written: $KEY_FILE"
          echo "Key ID  : $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer  : $APP_STORE_CONNECT_ISSUER_ID"

          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 80 lines ======"
            tail -80 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          cat > /tmp/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          PLIST_EOF

          xcodebuild \
            -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
