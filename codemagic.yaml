workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ── Signing ───────────────────────────────────────────────────────────────
    # NO ios_signing block — that block contacts Apple Developer Portal and
    # pulls "GUBER_AppStore_Profile_v3" (its Portal name) before scripts run,
    # overriding everything. Instead we use app-store-connect fetch-signing-files
    # with --profile-name so only "GUBER_Profile_v3" ever lands on disk.
    #
    # project.pbxproj Release target:
    #   CODE_SIGN_STYLE               = Manual
    #   CODE_SIGN_IDENTITY            = "Apple Distribution"
    #   PROVISIONING_PROFILE_SPECIFIER = "GUBER_Profile_v3"
    #
    # Required vars in Codemagic environment group "Default":
    #   APP_STORE_CONNECT_ISSUER_ID
    #   APP_STORE_CONNECT_KEY_IDENTIFIER
    #   APP_STORE_CONNECT_PRIVATE_KEY
    # ─────────────────────────────────────────────────────────────────────────
    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        TARGET_PROFILE: GUBER_Profile_v3
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Set up code signing — GUBER_Profile_v3 only
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          # ── Certificate into keychain ─────────────────────────────────────
          keychain initialize
          keychain add-certificates

          # ── Wipe everything Codemagic may have pre-installed ─────────────
          echo "=== Clearing profile directory ==="
          rm -rf "${PROF_DIR:?}"/*
          mkdir -p "$PROF_DIR"

          echo "=== Fetching ONLY '$TARGET_PROFILE' from Apple Developer ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --profile-name "$TARGET_PROFILE" \
            --create

          # ── List what landed on disk ──────────────────────────────────────
          echo "=== Profiles on disk after fetch ==="
          IDX=0
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            IDX=$((IDX+1))
            security cms -D -i "$f" -o "/tmp/_p${IDX}.plist" 2>/dev/null
            N=$(/usr/libexec/PlistBuddy -c "Print :Name" "/tmp/_p${IDX}.plist" 2>/dev/null || echo "UNKNOWN")
            U=$(/usr/libexec/PlistBuddy -c "Print :UUID" "/tmp/_p${IDX}.plist" 2>/dev/null || echo "UNKNOWN")
            PUSH=$(grep -c "aps-environment"                  "/tmp/_p${IDX}.plist" 2>/dev/null || true)
            SIWA=$(grep -c "com.apple.developer.applesignin"  "/tmp/_p${IDX}.plist" 2>/dev/null || true)
            echo "  [$IDX] Name : $N"
            echo "       UUID : $U"
            echo "       Push : $PUSH  |  SIWA : $SIWA"
          done
          echo "  Total on disk: $IDX"

          # ── Delete anything that is NOT GUBER_Profile_v3 ─────────────────
          echo "=== Pruning — keeping only '$TARGET_PROFILE' ==="
          KEPT=0
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" -o /tmp/_prune.plist 2>/dev/null
            N=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/_prune.plist 2>/dev/null || echo "")
            if [ "$N" = "$TARGET_PROFILE" ]; then
              KEPT=$((KEPT+1))
              echo "  KEEP   : $N"
            else
              echo "  DELETE : $N"
              rm -f "$f"
            fi
          done

          if [ "$KEPT" -eq 0 ]; then
            echo ""
            echo "FATAL: '$TARGET_PROFILE' was not found."
            echo "Check that a profile named exactly '$TARGET_PROFILE' exists on"
            echo "Apple Developer Portal for bundle ID $BUNDLE_ID."
            echo "Rename or recreate it at developer.apple.com → Profiles, then re-run."
            exit 1
          fi

          # ── Capability audit ──────────────────────────────────────────────
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision | head -1)
          security cms -D -i "$PROF_FILE" -o /tmp/chosen.plist 2>/dev/null
          PUSH=$( grep -c "aps-environment"                 /tmp/chosen.plist 2>/dev/null || true)
          SIWA=$( grep -c "com.apple.developer.applesignin" /tmp/chosen.plist 2>/dev/null || true)
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID"  /tmp/chosen.plist 2>/dev/null)

          echo ""
          echo "=== '$TARGET_PROFILE' capability audit ==="
          echo "  UUID : $UUID"
          echo "  Push Notifications (aps-environment)   : $PUSH"
          echo "  Sign in with Apple (applesignin)       : $SIWA"

          if [ "$PUSH" -eq 0 ] || [ "$SIWA" -eq 0 ]; then
            echo ""
            echo "FATAL: '$TARGET_PROFILE' is missing Push Notifications or Sign in with Apple."
            echo "  Go to developer.apple.com → Certificates, IDs & Profiles"
            echo "  → Profiles → '$TARGET_PROFILE' → Edit → Save"
            echo "  This regenerates the profile to include current App ID capabilities."
            exit 1
          fi
          echo "  Status: OK — both capabilities present"

          # ── Patch pbxproj ─────────────────────────────────────────────────
          xcode-project use-profiles

          echo ""
          echo "=== Release signing after use-profiles ==="
          grep -E "PROVISIONING_PROFILE|CODE_SIGN" \
            ios/App/App.xcodeproj/project.pbxproj | grep -v "//" || true

      - name: Archive and Export — GUBER_Profile_v3
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # ── Confirm which profile is on disk ────────────────────────────
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROF_FILE" ]; then
            echo "FATAL: No profile on disk."; exit 1
          fi
          security cms -D -i "$PROF_FILE" -o /tmp/use_prof.plist 2>/dev/null
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/use_prof.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/use_prof.plist)

          echo "╔══════════════════════════════════════════════════════════╗"
          printf "║  PROFILE : %-44s ║\n" "$PROFILE_NAME"
          printf "║  UUID    : %-44s ║\n" "$PROFILE_UUID"
          echo "╚══════════════════════════════════════════════════════════╝"

          if [ "$PROFILE_NAME" != "$TARGET_PROFILE" ]; then
            echo "FATAL: profile on disk is '$PROFILE_NAME', expected '$TARGET_PROFILE'."
            exit 1
          fi

          # ── API key (.p8) ───────────────────────────────────────────────
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          else
            { echo "-----BEGIN PRIVATE KEY-----"
              printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY"
              echo ""
              echo "-----END PRIVATE KEY-----"; } > "$AUTH_KEY_PATH"
          fi
          chmod 600 "$AUTH_KEY_PATH"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          # ── ARCHIVE ──────────────────────────────────────────────────────
          echo "=== Archiving with profile: $PROFILE_NAME ($PROFILE_UUID) ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── Confirm embedded profile ─────────────────────────────────────
          EMBEDDED="$ARCHIVE_PATH/Products/Applications/App.app/embedded.mobileprovision"
          if [ -f "$EMBEDDED" ]; then
            security cms -D -i "$EMBEDDED" -o /tmp/emb.plist 2>/dev/null
            EMB_N=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/emb.plist 2>/dev/null || echo "?")
            EMB_U=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/emb.plist 2>/dev/null || echo "?")
            echo "=== Profile embedded in .xcarchive ==="
            echo "  Name : $EMB_N"
            echo "  UUID : $EMB_U"
          fi

          # ── ExportOptions — UUID pinned, method app-store-connect ────────
          cat > /tmp/ExportOptions.plist << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store-connect</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>teamID</key>
  <string>${TEAM_ID}</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>${BUNDLE_ID}</key>
    <string>${PROFILE_UUID}</string>
  </dict>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          # ── EXPORT ───────────────────────────────────────────────────────
          echo "=== Exporting — UUID: $PROFILE_UUID ==="
          xcodebuild \
            -exportArchive \
            -archivePath               "$ARCHIVE_PATH" \
            -exportOptionsPlist        /tmp/ExportOptions.plist \
            -exportPath                "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
