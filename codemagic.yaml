workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Patch Xcode signing
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          # Verify Codemagic ios_signing actually installed a profile
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROF_FILE" ]; then
            echo "FATAL: No provisioning profile installed by ios_signing group."
            echo "Make sure APP_STORE_CONNECT_PRIVATE_KEY / KEY_IDENTIFIER / ISSUER_ID"
            echo "are set in the Codemagic 'Default' environment group."
            exit 1
          fi

          security cms -D -i "$PROF_FILE" -o /tmp/prof.plist 2>/dev/null
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/prof.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/prof.plist)
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

          # Patch project.pbxproj — replace the hardcoded profile name with the
          # name of whichever profile Codemagic downloaded, so xcodebuild finds it.
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i "s/GUBER_Profile_v3/$PROFILE_NAME/g" "$PBXPROJ"
          echo "Patched $PBXPROJ: GUBER_Profile_v3 → $PROFILE_NAME"

          # Persist UUID for the Archive step
          echo "$PROFILE_UUID" > /tmp/CM_PROFILE_UUID
          echo "$PROFILE_NAME" > /tmp/CM_PROFILE_NAME

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          PROFILE_UUID=$(cat /tmp/CM_PROFILE_UUID)
          PROFILE_NAME=$(cat /tmp/CM_PROFILE_NAME)

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          echo "Archiving with profile: $PROFILE_NAME ($PROFILE_UUID)"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>provisioningProfiles</key><dict>
              <key>$BUNDLE_ID</key><string>$PROFILE_UUID</string>
            </dict>
          </dict></plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
