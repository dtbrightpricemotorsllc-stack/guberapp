workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Code signing uses identities stored in the Codemagic dashboard under
    # Code signing identities:
    #   Certificate:          GUBER_iOS_Distribution
    #   Provisioning profile: GUBER_AppStore_Profile
    #
    # App Store Connect API key (required for TestFlight upload) — set these
    # three environment variables in the Codemagic dashboard:
    #   APP_STORE_CONNECT_ISSUER_ID       From App Store Connect → Keys page
    #   APP_STORE_CONNECT_KEY_IDENTIFIER  Key ID shown next to the key name
    #   APP_STORE_CONNECT_PRIVATE_KEY     Full contents of the downloaded .p8 file
    # ---------------------------------------------------------------------------
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Patch SPM version constraints
        # @capacitor-community/background-geolocation ships with `from: "7.0.0"`
        # which conflicts with all other Capacitor 8 plugins that use `from: "8.0.0"`.
        # The Swift plugin code is Cap-8 compatible; only the version floor needs lifting.
        #
        # @capacitor/preferences@8.0.1 still calls the single-arg getString() overload
        # which was removed in the capacitor-swift-pm 8.3.0 binary XCFramework.
        # We patch it to use the two-arg form (empty-string default) so it compiles
        # under the same binary that @capacitor/browser@8.0.3 targets.
        script: |
          # --- Patch 1: background-geolocation version floor ---
          sed -i '' 's/from: "7\.0\.0"/from: "8.0.0"/g' \
            node_modules/@capacitor-community/background-geolocation/Package.swift
          echo "Patched: $(grep 'capacitor-swift-pm' node_modules/@capacitor-community/background-geolocation/Package.swift)"

          # --- Patch 2: @capacitor/preferences — fix single-arg getString + reject ---
          # capacitor-swift-pm 8.3.0 binary removed one-arg overloads of getString()
          # and reject(). Replace with explicit multi-arg forms.
          PREFS="node_modules/@capacitor/preferences/ios/Sources/PreferencesPlugin/PreferencesPlugin.swift"
          sed -i '' 's/let group = call\.getString("group")/let group = call.getString("group", "")/g' "$PREFS"
          sed -i '' 's/if let group = group {/if !group.isEmpty {/g' "$PREFS"
          sed -i '' 's/guard let key = call\.getString("key") else {/let key = call.getString("key", ""); guard !key.isEmpty else {/g' "$PREFS"
          sed -i '' 's/call\.reject("Must provide a key")/call.reject("Must provide a key", nil, nil, nil)/g' "$PREFS"
          echo "Patched PreferencesPlugin.swift: $(grep -c 'call\.' "$PREFS") call.* lines"

          # --- Patch 3: @capacitor/app — fix single-arg reject ---
          APP="node_modules/@capacitor/app/ios/Sources/AppPlugin/AppPlugin.swift"
          sed -i '' 's/call\.reject("Unable to get App Info")/call.reject("Unable to get App Info", nil, nil, nil)/g' "$APP"
          echo "Patched AppPlugin.swift: $(grep 'call.reject' "$APP")"

          # --- Patch 4: @capacitor/browser — fix single-arg getString + reject ---
          # BrowserPlugin uses single-arg getString("url") and several single-arg rejects.
          BROWSER="node_modules/@capacitor/browser/ios/Sources/BrowserPlugin/BrowserPlugin.swift"
          # getString("url") is used in a `guard let` — replace with two-arg + isEmpty guard
          sed -i '' 's/guard let urlString = call\.getString("url"), let url = URL(string: urlString) else {/let urlStringRaw = call.getString("url", ""); guard let url = URL(string: urlStringRaw), !urlStringRaw.isEmpty else {/g' "$BROWSER"
          # Other optional getString calls — add default empty string
          sed -i '' 's/call\.getString("toolbarColor")/call.getString("toolbarColor", "")/g' "$BROWSER"
          sed -i '' 's/call\.getString("presentationStyle")/call.getString("presentationStyle", "")/g' "$BROWSER"
          # Single-arg reject calls
          sed -i '' 's/call\.reject("Must provide a valid URL to open")/call.reject("Must provide a valid URL to open", nil, nil, nil)/g' "$BROWSER"
          sed -i '' 's/call\.reject("Unable to display URL")/call.reject("Unable to display URL", nil, nil, nil)/g' "$BROWSER"
          sed -i '' 's/call\.reject("No active window to close!")/call.reject("No active window to close!", nil, nil, nil)/g' "$BROWSER"
          echo "Patched BrowserPlugin.swift: $(grep -c 'call\.' "$BROWSER") call.* lines"

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Pin capacitor-swift-pm to 8.0.0 (binary 8.3.0 removed reject())
        # capacitor-swift-pm 8.3.0 binary XCFramework removed `reject()` from
        # CAPPluginCall entirely (no one-arg, no four-arg overload — gone).
        # Every plugin we use (@capacitor/app, /browser, /preferences,
        # @aparajita/capacitor-biometric-auth) calls `call.reject(...)` and fails
        # to compile against 8.3.0. Pin to 8.0.0 where the API still exists.
        # cap sync regenerates CapApp-SPM/Package.swift, so this MUST run after sync.
        script: |
          PKG="ios/App/CapApp-SPM/Package.swift"
          sed -i '' 's|exact: "8\.3\.0"|exact: "8.0.0"|g' "$PKG"
          echo "Pinned capacitor-swift-pm:"
          grep 'capacitor-swift-pm' "$PKG"

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing keychain
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Xcode archive (App Store export)
        script: |
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # Write an xcconfig that forces minimal strict-concurrency for ALL targets,
          # including SPM packages — plain xcodebuild overrides don't reach SPM targets.
          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          # Archive — pipe to log and capture exit code separately
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -xcconfig /tmp/spm_override.xcconfig \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo ""
            echo "====== LAST 50 LINES ======"
            tail -50 /tmp/xcodebuild_archive.log
            echo ""
            echo "====== COMPILE ERRORS (these are the actionable lines) ======"
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -80 || \
              grep -iE " error:" /tmp/xcodebuild_archive.log | grep -v "^note:" | head -80 || \
              echo "(no error: lines found — check artifacts zip for full log)"
            exit "$ARCHIVE_STATUS"
          fi

          # Export IPA
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$IPA_DIR" 2>&1 | tee /tmp/xcodebuild_export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
