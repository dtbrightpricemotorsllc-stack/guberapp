workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ── Signing ───────────────────────────────────────────────────────────────
    # ios_signing tells Codemagic to fetch ONLY the App Store profile for this
    # bundle identifier before scripts run, using the APP_STORE_CONNECT_* keys
    # from the Default env group. This is the canonical Codemagic approach and
    # avoids downloading multiple profiles that could confuse export.
    #
    # project.pbxproj Release target config has:
    #   CODE_SIGN_STYLE               = Manual
    #   CODE_SIGN_IDENTITY            = "Apple Distribution"
    #   PROVISIONING_PROFILE_SPECIFIER = "GUBER_Profile_v3"
    #
    # Required vars in Codemagic environment group "Default":
    #   APP_STORE_CONNECT_ISSUER_ID
    #   APP_STORE_CONNECT_KEY_IDENTIFIER
    #   APP_STORE_CONNECT_PRIVATE_KEY
    # ─────────────────────────────────────────────────────────────────────────
    environment:
      groups:
        - Default
      ios_signing:
        distribution_type: APP_STORE
        bundle_identifier: com.guber.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

          # ── AUDIT: show every installed profile and its capabilities ──────
          echo "=== Profiles installed by ios_signing ==="
          COUNT=0
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            COUNT=$((COUNT+1))
            security cms -D -i "$f" -o /tmp/_prof_${COUNT}.plist 2>/dev/null
            NAME=$(/usr/libexec/PlistBuddy   -c "Print :Name" /tmp/_prof_${COUNT}.plist 2>/dev/null || echo "UNKNOWN")
            UUID=$(/usr/libexec/PlistBuddy   -c "Print :UUID" /tmp/_prof_${COUNT}.plist 2>/dev/null || echo "UNKNOWN")
            APPID=$(/usr/libexec/PlistBuddy  -c "Print :Entitlements:application-identifier" /tmp/_prof_${COUNT}.plist 2>/dev/null || echo "UNKNOWN")
            PUSH=$(grep -c "aps-environment" /tmp/_prof_${COUNT}.plist 2>/dev/null || true)
            SIWA=$(grep -c "com.apple.developer.applesignin" /tmp/_prof_${COUNT}.plist 2>/dev/null || true)

            echo "  [$COUNT] Name  : $NAME"
            echo "       UUID  : $UUID"
            echo "       AppID : $APPID"
            echo "       Push Notifications (aps-environment)    : $PUSH"
            echo "       Sign in with Apple (applesignin)        : $SIWA"

            if [ "$PUSH" = "0" ] || [ "$SIWA" = "0" ]; then
              echo ""
              echo "  !! FATAL: Profile '$NAME' ($UUID) is missing capabilities !!"
              echo "     ACTION: developer.apple.com → Profiles → '$NAME' → Edit → Save"
              echo "     Then cancel this build and re-run."
              echo ""
              exit 1
            fi
            echo "       Status : OK — has both required capabilities"
          done

          if [ "$COUNT" = "0" ]; then
            echo "FATAL: No provisioning profiles were installed."
            echo "Check APP_STORE_CONNECT_* credentials in Codemagic env group 'Default'."
            exit 1
          fi

          echo "=== Provisioning profile check passed ($COUNT profile(s) installed) ==="
          echo "=== Signing settings in Release config after use-profiles ==="
          grep -E "PROVISIONING_PROFILE|CODE_SIGN" \
            ios/App/App.xcodeproj/project.pbxproj | grep -v "//" || true

      - name: Archive and Export (App Store)
        script: |
          set -euo pipefail
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # ── Resolve which profile is on disk ────────────────────────────
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROF_FILE" ]; then
            echo "FATAL: No profile on disk at archive time."; exit 1
          fi
          security cms -D -i "$PROF_FILE" -o /tmp/export_prof.plist 2>/dev/null
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/export_prof.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/export_prof.plist)
          echo "=== Using profile for archive + export ==="
          echo "  Name : $PROFILE_NAME"
          echo "  UUID : $PROFILE_UUID"
          echo "  File : $PROF_FILE"

          # ── Write API key (.p8) ─────────────────────────────────────────
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          else
            {
              echo "-----BEGIN PRIVATE KEY-----"
              printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY"
              echo ""
              echo "-----END PRIVATE KEY-----"
            } > "$AUTH_KEY_PATH"
          fi
          chmod 600 "$AUTH_KEY_PATH"

          # Concurrency override for SPM
          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          # ── ARCHIVE ──────────────────────────────────────────────────────
          echo "=== Starting archive ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── Confirm what is embedded in the .xcarchive ──────────────────
          echo "=== Entitlements embedded in archived App.app ==="
          codesign -d --entitlements :- \
            "$ARCHIVE_PATH/Products/Applications/App.app" 2>&1 || true
          echo "=== Profile embedded in archived App.app ==="
          if [ -f "$ARCHIVE_PATH/Products/Applications/App.app/embedded.mobileprovision" ]; then
            security cms -D -i \
              "$ARCHIVE_PATH/Products/Applications/App.app/embedded.mobileprovision" \
              2>/dev/null | grep -E "Name|UUID|aps-environment|applesignin" | head -10 || true
          else
            echo "(no embedded.mobileprovision in archive)"
          fi

          # ── BUILD EXPORT OPTIONS ─────────────────────────────────────────
          # Profile referenced by NAME (read from disk above — guaranteed match)
          # and by UUID for belt-and-suspenders.
          cat > /tmp/ExportOptions.plist << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store-connect</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>teamID</key>
  <string>${TEAM_ID}</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>${BUNDLE_ID}</key>
    <string>${PROFILE_NAME}</string>
  </dict>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          # ── EXPORT ───────────────────────────────────────────────────────
          echo "=== Starting export (profile: $PROFILE_NAME / $PROFILE_UUID) ==="
          xcodebuild \
            -exportArchive \
            -archivePath               "$ARCHIVE_PATH" \
            -exportOptionsPlist        /tmp/ExportOptions.plist \
            -exportPath                "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported successfully ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
