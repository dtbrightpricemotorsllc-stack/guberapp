workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        APP_STORE_CONNECT_KEY_IDENTIFIER: UG7A49Y842
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      # ios_signing (above) installs the distribution certificate into the
      # keychain, but also patches project.pbxproj to Manual + "Apple
      # Distribution". We reset that here so xcodebuild sees only Automatic.
      - name: Reset project signing to Automatic
        script: |
          set -euo pipefail
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"

          python3 << 'PYEOF'
          import re, sys

          path = "ios/App/App.xcodeproj/project.pbxproj"
          with open(path) as f:
              text = f.read()

          original = text

          # Force every CODE_SIGN_STYLE to Automatic
          text = re.sub(r'(CODE_SIGN_STYLE\s*=\s*)\w+;', r'\1Automatic;', text)

          # Remove any explicit CODE_SIGN_IDENTITY that Codemagic may have
          # injected (Apple Distribution / iPhone Distribution / etc.).
          # We keep empty-string identity ("") and "iPhone Developer" (debug).
          text = re.sub(
              r'\s*CODE_SIGN_IDENTITY = "(?!iPhone Developer|")[^"]*";', '', text
          )

          # Remove PROVISIONING_PROFILE_SPECIFIER and PROVISIONING_PROFILE
          # (UUID-based) — not needed with Automatic + -allowProvisioningUpdates.
          text = re.sub(r'\s*PROVISIONING_PROFILE_SPECIFIER = "[^"]*";', '', text)
          text = re.sub(r'\s*PROVISIONING_PROFILE = "[^"]*";', '', text)

          with open(path, 'w') as f:
              f.write(text)

          if text != original:
              print("Signing reset: removed Manual overrides from project.pbxproj")
          else:
              print("project.pbxproj already clean — no changes needed")
          PYEOF

          echo "=== Signing state after reset ==="
          grep -n "CODE_SIGN_STYLE\|CODE_SIGN_IDENTITY\|PROVISIONING_PROFILE\|DEVELOPMENT_TEAM" "$PBXPROJ" || true

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          printf 'SWIFT_STRICT_CONCURRENCY = minimal\n' > /tmp/spm_override.xcconfig

          # Write ASC key for -allowProvisioningUpdates
          KEY_FILE="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          echo "Key ID : $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer : $APP_STORE_CONNECT_ISSUER_ID"

          # CODE_SIGN_STYLE=Automatic + CODE_SIGN_IDENTITY="" as command-line
          # overrides ensure no residual Manual setting from ios_signing or
          # cap sync can sneak through.  -allowProvisioningUpdates fetches the
          # correct App Store distribution profile from ASC automatically.
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 80 lines ======"
            tail -80 /tmp/xcodebuild_archive.log
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          cat > /tmp/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>7MC93QFW6Q</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          PLIST_EOF

          xcodebuild \
            -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
