workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    # ---------------------------------------------------------------------------
    # Signing notes:
    #   - PROVISIONING_PROFILE_SPECIFIER is hardcoded to "GUBER_AppStore_Profile_v3"
    #     in the Release build config inside project.pbxproj so cap sync ios
    #     cannot wipe it.
    #   - The signing + archive + export step reads the profile name live from the
    #     downloaded .mobileprovision file using PlistBuddy so there is zero
    #     mismatch between what is on disk and what ExportOptions.plist requests.
    #   - -allowProvisioningUpdates lets Xcode download/refresh the profile if it
    #     cannot be found locally by name.
    # ---------------------------------------------------------------------------
    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (copy web assets into Xcode project)
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"

      - name: Sign, Archive, and Export
        script: |
          set -euo pipefail

          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          mkdir -p "$PROF_DIR" "$CM_BUILD_DIR/build/ios/xcarchive" "$IPA_DIR"

          # ── 1. CERTIFICATES ────────────────────────────────────────────────
          echo "=== Setting up keychain and certificates ==="
          keychain initialize
          keychain add-certificates

          # ── 2. FETCH FRESH PROFILE ─────────────────────────────────────────
          echo "=== Clearing cached profiles ==="
          rm -rf "${PROF_DIR:?}"/*

          echo "=== Fetching App Store profile from Apple Developer ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id   "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id      "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create

          # ── 3. READ PROFILE NAME FROM DISK WITH PLISTBUDDY ─────────────────
          # PlistBuddy is the only 100 % reliable method — no sed/grep pipeline
          # that can fail on whitespace or special characters.
          PROF_FILE=$(ls "$PROF_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROF_FILE" ]; then
            echo "ERROR: No provisioning profile was downloaded to $PROF_DIR"
            echo "Check APP_STORE_CONNECT_* credentials in Codemagic env group 'Default'"
            exit 1
          fi

          # Decode the CMS-signed profile to a readable plist
          security cms -D -i "$PROF_FILE" -o /tmp/decoded_profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/decoded_profile.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/decoded_profile.plist)
          PUSH_COUNT=$(grep -c "aps-environment" /tmp/decoded_profile.plist || true)
          SIWA_COUNT=$(grep -c "com.apple.developer.applesignin" /tmp/decoded_profile.plist || true)

          echo "=== Profile resolved from disk ==="
          echo "  Name : $PROFILE_NAME"
          echo "  UUID : $PROFILE_UUID"
          echo "  File : $PROF_FILE"
          echo "  aps-environment (Push) count : $PUSH_COUNT"
          echo "  applesignin (SIWA) count     : $SIWA_COUNT"

          if [ "$PUSH_COUNT" = "0" ] || [ "$SIWA_COUNT" = "0" ]; then
            echo ""
            echo "FATAL: Profile '$PROFILE_NAME' is missing Push Notifications or"
            echo "Sign in with Apple. The profile on Apple Developer Portal must be"
            echo "regenerated to include the current App ID capabilities."
            echo ""
            echo "ACTION: developer.apple.com → Certificates, IDs & Profiles"
            echo "  → Profiles → find '$PROFILE_NAME' → Edit → Save"
            echo "Then re-run this build."
            exit 1
          fi
          echo "  OK: profile contains both required capabilities"

          # ── 4. PATCH PBXPROJ ───────────────────────────────────────────────
          xcode-project use-profiles

          echo "=== Signing settings in Release config after use-profiles ==="
          grep -E "PROVISIONING_PROFILE|CODE_SIGN" \
            ios/App/App.xcodeproj/project.pbxproj || true

          # ── 5. WRITE API KEY ───────────────────────────────────────────────
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          else
            # Key stored as raw body without PEM headers — add them
            {
              echo "-----BEGIN PRIVATE KEY-----"
              printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY"
              echo ""
              echo "-----END PRIVATE KEY-----"
            } > "$AUTH_KEY_PATH"
          fi
          chmod 600 "$AUTH_KEY_PATH"

          # ── 6. XCCONFIG OVERRIDE ───────────────────────────────────────────
          printf 'SWIFT_STRICT_CONCURRENCY = minimal\nOTHER_SWIFT_FLAGS = $(inherited) -strict-concurrency=minimal\n' \
            > /tmp/spm_override.xcconfig

          # ── 7. ARCHIVE ─────────────────────────────────────────────────────
          echo "=== Starting archive (profile: $PROFILE_NAME) ==="
          xcodebuild \
            -workspace     "$XCODE_WORKSPACE" \
            -scheme        "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath   "$ARCHIVE_PATH" \
            -destination   "generic/platform=iOS" \
            -xcconfig      /tmp/spm_override.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/xcodebuild_archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "====== ARCHIVE FAILED — last 50 lines ======"
            tail -50 /tmp/xcodebuild_archive.log
            grep -E "\.swift:[0-9]+:[0-9]+: error:" /tmp/xcodebuild_archive.log | head -40 || true
            exit "$ARCHIVE_STATUS"
          fi
          echo "** ARCHIVE SUCCEEDED **"

          # ── 8. DUMP ARCHIVE ENTITLEMENTS ──────────────────────────────────
          echo "=== Entitlements embedded in archived App.app ==="
          security cms -D -i \
            "$ARCHIVE_PATH/Products/Applications/App.app/embedded.mobileprovision" \
            2>/dev/null | grep -A2 "aps-environment\|applesignin" || \
            codesign -d --entitlements :- \
              "$ARCHIVE_PATH/Products/Applications/App.app" 2>/dev/null || \
            echo "(could not read archive entitlements)"

          # ── 9. BUILD EXPORT OPTIONS ────────────────────────────────────────
          # Profile name is read from the actual file on disk — guaranteed match.
          cat > /tmp/ExportOptions.plist << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>teamID</key>
  <string>${TEAM_ID}</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>${BUNDLE_ID}</key>
    <string>${PROFILE_NAME}</string>
  </dict>
</dict>
</plist>
PLIST

          echo "=== ExportOptions.plist (profile: $PROFILE_NAME) ==="
          cat /tmp/ExportOptions.plist

          # ── 10. EXPORT ─────────────────────────────────────────────────────
          echo "=== Starting export ==="
          xcodebuild \
            -exportArchive \
            -archivePath               "$ARCHIVE_PATH" \
            -exportOptionsPlist        /tmp/ExportOptions.plist \
            -exportPath                "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath     "$AUTH_KEY_PATH" \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log
          EXPORT_STATUS=${PIPESTATUS[0]}

          rm -f "$AUTH_KEY_PATH"

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "====== EXPORT FAILED — last 40 lines ======"
            tail -40 /tmp/xcodebuild_export.log
            exit "$EXPORT_STATUS"
          fi

          echo "=== IPA exported ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
