workflows:
  ios-app-store:
    name: GUBER iOS — App Store
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - Default
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.guber.app
        TEAM_ID: 7MC93QFW6Q
        APP_STORE_CONNECT_KEY_IDENTIFIER: UG7A49Y842
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.guber.app
      xcode: 16.2

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme     "$XCODE_SCHEME"

      - name: Apply provisioning profiles
        script: |
          # ios_signing downloaded the App Store profile via the connected ASC
          # key and installed it into ~/Library/MobileDevice/Provisioning Profiles/.
          # xcode-project use-profiles matches it to the bundle ID and writes
          # the profile UUID + CODE_SIGN_IDENTITY into the project.pbxproj.
          # The project already has CODE_SIGN_STYLE=Manual committed.
          xcode-project use-profiles \
            --workspace "$XCODE_WORKSPACE" \
            --scheme    "$XCODE_SCHEME"

      - name: Archive and Export
        script: |
          set -euo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/ipa"
          mkdir -p "$ARCHIVE_PATH" "$IPA_DIR"

          KEY_FILE="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"

          xcodebuild archive \
            -workspace   "$XCODE_WORKSPACE" \
            -scheme      "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild_archive.log
          test "${PIPESTATUS[0]}" -eq 0

          cat > /tmp/ExportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
  <key>method</key><string>app-store-connect</string>
  <key>teamID</key><string>7MC93QFW6Q</string>
  <key>signingStyle</key><string>manual</string>
</dict></plist>
EOF

          xcodebuild -exportArchive \
            -archivePath        "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         "$IPA_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath     "$KEY_FILE" \
            2>&1 | tee /tmp/xcodebuild_export.log
          test "${PIPESTATUS[0]}" -eq 0

          echo "=== IPA ==="
          find "$IPA_DIR" -name "*.ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
