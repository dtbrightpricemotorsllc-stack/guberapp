name: Readability Check

on:
  push:
  pull_request:

jobs:
  faint-text:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run faint-text readability check
        run: node scripts/check-faint-text.mjs

  dark-gradients:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test dark-gradient checker
        run: node scripts/check-dark-gradients.test.mjs

      - name: Run dark-gradient inline-style check
        run: node scripts/check-dark-gradients.mjs
