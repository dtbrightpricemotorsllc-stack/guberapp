name: Build Android AAB

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android SDK 36 + build tools (via pre-installed sdkmanager)
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Point Gradle to pre-installed Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Sync Capacitor (web assets + plugins)
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: guber-v1.2-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
