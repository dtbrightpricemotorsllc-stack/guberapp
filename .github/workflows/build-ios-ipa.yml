name: Build iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Resolve Swift Package Manager dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace ios/App/App.xcworkspace \
            -scheme App

      - name: Write ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p /tmp/asc ~/.appstoreconnect/private_keys
          # Use Python to reliably normalise the PEM regardless of how it was stored:
          # handles CRLF endings, literal \n sequences, and missing trailing newline.
          python3 - <<'PYEOF'
          import os, re, sys
          key = os.environ['ASC_PRIVATE_KEY']
          # Normalise: strip CR, expand literal \n sequences
          key = key.replace('\r', '').replace('\\n', '\n').strip()
          # If the whole key landed on one line (no newlines), reconstruct proper PEM
          if '\n' not in key:
              m = re.search(r'-----BEGIN PRIVATE KEY-----(.+?)-----END PRIVATE KEY-----', key)
              if not m:
                  print('ERROR: cannot locate PEM markers in ASC_PRIVATE_KEY secret')
                  sys.exit(1)
              b64 = m.group(1).strip().replace(' ', '')
              key = f'-----BEGIN PRIVATE KEY-----\n{b64}\n-----END PRIVATE KEY-----'
          key = key + '\n'
          kid = os.environ['ASC_KEY_ID']
          path = f'/tmp/asc/AuthKey_{kid}.p8'
          with open(path, 'w') as f:
              f.write(key)
          lines = key.splitlines()
          print(f'Key written: {len(lines)} lines')
          print(f'Line 1: {lines[0]}')
          print(f'Last line: {lines[-1]}')
          PYEOF
          cp /tmp/asc/AuthKey_${ASC_KEY_ID}.p8 \
             ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -workspace       ios/App/App.xcworkspace \
            -scheme          App \
            -configuration   Release \
            -archivePath     /tmp/App.xcarchive \
            -destination     "generic/platform=iOS" \
            -derivedDataPath /tmp/dd \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath     /tmp/asc/AuthKey_${ASC_KEY_ID}.p8 \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=7MC93QFW6Q \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>7MC93QFW6Q</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath        /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath         /tmp/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyID       "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath     /tmp/asc/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: guber-ios-ipa
          path: /tmp/ipa/*.ipa
          retention-days: 14

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type      ios \
            --file      "$(find /tmp/ipa -name '*.ipa' | head -1)" \
            --apiKey    "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
